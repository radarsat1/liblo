name: C/C++ CI

on: [push, pull_request]

jobs:
  Linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run: |
        sudo apt update
        sudo apt-get install -y g++-9 autoconf-archive curl zlib1g-dev doxygen
    - name: autogen
      run:
        pwd
        && mkdir $PWD/inst
        && env NOCONFIGURE=1 am_opt=--copy ./autogen.sh
        && (./configure --enable-static --prefix=$PWD/inst || (cat config.log; false))
    - name: make
      run: make
    - name: make test
      run: make test
    - name: make distcheck
      run: make distcheck
    - uses: actions/upload-artifact@v4
      with:
        name: tarball
        path: |
          liblo*.tar.gz

  MacOS:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      CC: clang
      CXX: clang++
      COMMON: -isysroot /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
      LDCOMMON: -Wl,-compatibility_version,12 -Wl,-current_version,12.1
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run: brew install autoconf-archive automake doxygen libtool
    - name: build for arm64
      run: |
        mkdir $PWD/inst
        ./autogen.sh \
          CFLAGS="$COMMON -arch arm64" \
          CXXFLAGS="$COMMON -arch arm64" \
          LDFLAGS="$COMMON -arch arm64 $LDCOMMON" \
          --enable-static \
          --prefix=$PWD/inst
        make install
        mv -v ./inst/lib/liblo.7.dylib ./inst/lib/liblo.7.dylib.arm64
        mv -v ./inst/lib/liblo.a ./inst/lib/liblo.a.arm64
    - name: Build for x86_64
      run: |
        make clean
        ./autogen.sh \
          CFLAGS="$COMMON -arch x86_64" \
          CXXFLAGS="$COMMON -arch x86_64" \
          LDFLAGS="$COMMON -arch x86_64 $LDCOMMON" \
          --enable-static \
          --prefix=$PWD/inst
        make install
        mv -v ./inst/lib/liblo.7.dylib ./inst/lib/liblo.7.dylib.x86_64
        mv -v ./inst/lib/liblo.a ./inst/lib/liblo.a.x86_64
    - name: Create Universal Binary
      run: |
        cd ./inst/lib
        lipo -create -output ./liblo.a ./liblo.a.arm64 ./liblo.a.x86_64
        lipo -create -output ./liblo.7.dylib ./liblo.7.dylib.arm64 ./liblo.7.dylib.x86_64
    - name: Run Tests
      run: make test
    - uses: actions/upload-artifact@v4
      with:
        name: dylib
        path: ./inst/lib/liblo.7.dylib

  Windows-Latest:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run windows build script
      shell: pwsh
      run: |
        mkdir bld
        cd bld\
        cmake ..\cmake -DCMAKE_BUILD_TYPE=Release -DWITH_STATIC=ON
        cmake --build . --target all_build --config Release
    - name: Run tests
      run: |
        cd bld\
        ctest -V

  merge:
    runs-on: ubuntu-latest
    needs: [Linux, MacOS]
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: artifact
          delete-merged: true
